<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png">
<link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png">
<link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png">
<link rel="icon" href="/favicon.ico">
<title>Archive — L. Carolan</title>

<style>
/* ===== YOUR ORIGINAL CSS (UNCHANGED) ===== */

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg: #f0ede6;
  --card-bg: #f7f5f0;
  --text-primary: #1a1a18;
  --text-secondary: #6b6b65;
  --text-tertiary: #9a9a94;
  --border: rgba(26,26,24,0.12);
  --radius: 14px;
  --font-display: 'Times New Roman', Times, 'Georgia', serif;
  --font-body: system-ui, -apple-system, BlinkMacSystemFont, 'Helvetica Neue', Arial, sans-serif;
  --font-mono: 'Courier New', Courier, monospace;
}

html { background: var(--bg); }

body {
  font-family: var(--font-body);
  background: var(--bg);
  color: var(--text-primary);
  min-height: 100vh;
  display: flex;
  flex-direction: column;
}

/* ... all your existing styles unchanged ... */

/* LIGHTBOX */

.lightbox {
  position: fixed;
  inset: 0;
  background: rgba(10,10,10,0.92);
  display: none;
  justify-content: center;
  align-items: center;
  padding: 3rem;
  z-index: 1000;
}

.lightbox.active { display: flex; }

.lightbox-content {
  width: 100%;
  max-width: 900px;
  max-height: 90vh;
  overflow-y: auto;
}

.lightbox img {
  width: 100%;
  height: auto;
  border-radius: var(--radius);
  margin-bottom: 2rem;
}

.field-note { color: #f5f5f0; max-width: 700px; }

.field-note h2 {
  font-family: var(--font-display);
  font-size: 2rem;
  font-weight: 400;
  margin-bottom: 0.5rem;
}

.field-location {
  font-family: var(--font-mono);
  font-size: 0.75rem;
  text-transform: uppercase;
  letter-spacing: 0.1em;
  color: rgba(255,255,255,0.6);
  margin-bottom: 1.5rem;
}

.field-note p {
  line-height: 1.8;
  color: rgba(255,255,255,0.85);
}

.close-btn {
  position: fixed;
  top: 30px;
  right: 40px;
  border: none;
  background: none;
  color: white;
  font-size: 2.5rem;
  cursor: pointer;
}

</style>
</head>

<body>

<!-- ===== YOUR HTML CONTENT (UNCHANGED) ===== -->
<nav>
  <span class="site-title">ARCHIVE</span>
  <div class="filter-nav" id="filter-nav">
    FILTER:
    <a class="active" data-filter="all" onclick="filterCards(this,'all')">ALL</a>
    <span>/</span>
    <a data-filter="professional" onclick="filterCards(this,'professional')">PROFESSIONAL</a>
    <span>/</span>
    <a data-filter="personal" onclick="filterCards(this,'personal')">PERSONAL</a>
  </div>
</nav>

<main>
  <div class="grid" id="grid">

    <!-- (your full grid stays exactly the same — omitted here for brevity) -->

  </div>
</main>

<footer>
  <span>© 2026. L. Carolan.</span>
  <a href="mailto:liampcarolan1@gmail.com">Email Contact</a>
</footer>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox">
  <button class="close-btn">&times;</button>

  <div class="lightbox-content">
    <img id="lightbox-image" src="">
    <div class="field-note">
      <h2 id="lightbox-title"></h2>
      <div class="field-location" id="lightbox-location"></div>
      <p id="lightbox-note"></p>
    </div>
  </div>
</div>

<!-- FIXED SCRIPT -->
<script>
document.addEventListener('DOMContentLoaded', () => {

  const lightbox = document.getElementById('lightbox');

  // PHOTO CLICK
  document.querySelectorAll('.card--photo').forEach(card => {
    card.addEventListener('click', function(e) {
      e.preventDefault();

      const img = this.querySelector('img');

      document.getElementById('lightbox-image').src = img.src;
      document.getElementById('lightbox-title').textContent = this.dataset.title || '';
      document.getElementById('lightbox-location').textContent = this.dataset.location || '';
      document.getElementById('lightbox-note').textContent = this.dataset.note || '';

      lightbox.classList.add('active');
    });
  });

  // CLOSE BUTTON
  document.querySelector('.close-btn').addEventListener('click', () => {
    lightbox.classList.remove('active');
  });

  // CLICK OUTSIDE
  lightbox.addEventListener('click', (e) => {
    if (e.target === lightbox) {
      lightbox.classList.remove('active');
    }
  });

  // ESC KEY
  document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape') {
      lightbox.classList.remove('active');
    }
  });

});
</script>

</body>
</html>
